<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MercWar Standard C & WinAPI Tutorial</title>
<link rel="stylesheet" href="index.css?v=49">
<link rel="stylesheet" href="index1.css?v=51">
<link rel="stylesheet" href="rru_gx.css?v=43">
</head>

<body>

<!-- MASTER TABLE LAYOUT -->
<table id="layoutTable" cellspacing="0" cellpadding="0" border="0" width="100%" height="100%">
  <tr>

    <!-- SIDEBAR CELL (FIXED WIDTH) -->
    <td id="sidebarCell" width="280" valign="top">

      <div id="sidebar">

        <!-- C LANGUAGE DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="cLang">
            Mercwar01's C Language Tutorial
            <span class="dropdown-arrow"></span>
          </div>

          <div id="cLang" class="dropdown-content">
            <div class="dropdown-inner-scroll">
              <script>
                document.write(
                  Array.from({length:20}, (_,i)=>
                    `<button onclick="loadChapter(${i+1})">Chapter ${i+1}</button>`
                  ).join("")
                );
              </script>
            </div>
          </div>
        </div>

        <!-- MERCWAR WINAPI NUMERIC DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="mwNum">
            MercWar WinAPI & DirectX Tutorial
            <span class="dropdown-arrow"></span>
          </div>

          <div id="mwNum" class="dropdown-content">
            <div class="dropdown-inner-scroll">
              <script>
                document.write(
                  Array.from({length:20}, (_,i)=>
                    `<button onclick="loadChapter(${21+i})">Chapter ${21+i}</button>`
                  ).join("")
                );
              </script>
            </div>
          </div>
        </div>

        <!-- MERCWAR LETTERS A–Y DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="mwLet">
            Havok: Avis & C/CY Framework
            <span class="dropdown-arrow"></span>
          </div>

          <div id="mwLet" class="dropdown-content">
            <div class="dropdown-inner-scroll">
              <script>
                const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                let out = "";
                for (let i=0; i<25; i++) {  // A–Y
                  const letter = letters[i];
                  out += `<button onclick="loadChapter('${letter}')">Chapter ${letter}</button>`;
                }
                document.write(out);
              </script>
            </div>
          </div>
        </div>

      </div>

    </td>

    <!-- CONTENT CELL -->
    <td id="contentCell" valign="top">
<div id="content-bnr">
<div id="gx-banner">
  <a href="https://mercwar.github.io/Constellation" target="_top"><span><i>Welcome to Tron's MercWar MSVC Academy, next up-link Constellation Gateway </i></span></a>
</div>
</div>
      <div id="content">
        <h1>MercWar Standard C & WinAPI Tutorial</h1>
        <p>Select a chapter from the sidebar.</p>
      </div>

    </td>

  </tr>
</table>

<script src="index.js?v=49"></script>

</body>
</html>
