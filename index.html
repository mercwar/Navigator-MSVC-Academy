<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MercWar Standard C & WinAPI Tutorial</title>
<link rel="stylesheet" href="index.css?v=74">
<link rel="stylesheet" href="index1.css?v=63">
<link rel="stylesheet" href="rru_gx.css?v=50">
</head>

<body>
<!-- Scroll Pin Toggle Button -->
<button id="scrollPinBtn" onclick="toggleScrollPin()" title="Pin/Unpin Scrollbar">
  <span id="scrollPinIcon">🔓</span> <span id="scrollPinText">Unpinned</span>
</button>

<!-- MASTER TABLE LAYOUT -->
<table id="layoutTable" cellspacing="0" cellpadding="0" border="0">
  <tr>

    <!-- SIDEBAR CELL (FIXED WIDTH) -->
    <td id="sidebarCell"  valign="top">

      <div id="sidebar">

        <!-- WAREZ DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="cWarez">
            Mercwar01's Free Dev Warez 
            <span class="dropdown-arrow"></span>
          </div>
          <div id="cWarez" class="dropdown-content">
            <div class="dropdown-inner-scroll" id="warez-buttons"></div>
          </div>
        </div>

        <!-- C LANGUAGE DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="cLang">
            Mercwar01's C Language Tutorial
            <span class="dropdown-arrow"></span>
          </div>
          <div id="cLang" class="dropdown-content">
            <div class="dropdown-inner-scroll" id="clang-buttons"></div>
          </div>
        </div>

        <!-- MERCWAR WINAPI NUMERIC DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="mwNum">
            MercWar WinAPI & DirectX Tutorial
            <span class="dropdown-arrow"></span>
          </div>
          <div id="mwNum" class="dropdown-content">
            <div class="dropdown-inner-scroll" id="mwNum-buttons"></div>
          </div>
        </div>

        <!-- MERCWAR LETTERS A–Y DROPDOWN -->
        <div class="dropdown">
          <div class="dropdown-header" data-dropdown="mwLet">
            Havok: Avis & C/CY Framework
            <span class="dropdown-arrow"></span>
          </div>
          <div id="mwLet" class="dropdown-content">
            <div class="dropdown-inner-scroll" id="mwLet-buttons"></div>
          </div>
        </div>

      </div>

    </td>

    <!-- CONTENT CELL -->
    <td id="contentCell" valign="top">
      <div id="content-bnr">
        <div id="gx-banner">
          <a href="https://mercwar.github.io/Constellation" target="_top">
            <span><i>Welcome to Tron's MercWar MSVC Academy, next up-link Constellation Gateway </i></span>
          </a>
        </div>
      </div>
      <div id="content">
        <h1>MercWar Standard C & WinAPI Tutorial</h1>
        <p>Select a chapter from the sidebar.</p>
      </div>
    </td>

  </tr>
</table>

<script src="index.js?v=66"></script>

<script>
// Generate Warez buttons (_A–_Y)
(() => {
  const letters = "abcdefghijklmnopqrstuvwxyz";
  const container = document.getElementById("warez-buttons");
  container.innerHTML = Array.from({length:26}, (_,i) => {
    const letter = letters[i];
    return `<button onclick="loadChapter('_${letter}')">Chapter ${letter}</button>`;
  }).join("");
})();

// Generate C Language buttons (1–20)
(() => {
  const container = document.getElementById("clang-buttons");
  container.innerHTML = Array.from({length:20}, (_,i) =>
    `<button onclick="loadChapter(${i+1})">Chapter ${i+1}</button>`
  ).join("");
})();

// Generate WinAPI numeric buttons (21–40)
(() => {
  const container = document.getElementById("mwNum-buttons");
  container.innerHTML = Array.from({length:20}, (_,i) =>
    `<button onclick="loadChapter(${21+i})">Chapter ${21+i}</button>`
  ).join("");
})();

// Generate WinAPI letter buttons (A–Y)
(() => {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const container = document.getElementById("mwLet-buttons");
  container.innerHTML = Array.from({length:25}, (_,i) => {
    const letter = letters[i];
    return `<button onclick="loadChapter('${letter}')">Chapter ${letter}</button>`;
  }).join("");
})();
</script>

</body>
</html>
